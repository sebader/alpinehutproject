# Deploys FetchDataFunctions to the dev crawler Function App on pushes to the `dev` branch.
# Dev app: alpinehutscrawler-dev (Flex Consumption, France Central, .NET 10 isolated, Durable Task Scheduler).
# Auth: OIDC via the dedicated least-privilege app registration "alpinehuts-crawler-dev-deploy"
# (Contributor scoped to the dev app only).

name: Deploy alpinehutscrawler-dev (dev)

on:
  push:
    branches:
      - dev
    paths:
      - 'FetchDataFunctions/**'
      - '.github/workflows/dev_alpinehutscrawler.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'FetchDataFunctions'
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC login
      contents: read # required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v7

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          # Remove any root global.json so setup-dotnet's SDK is used
          rm -f ../global.json
          dotnet build --configuration Release --output ./output
          popd

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_DEV_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_DEV_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_DEV_SUBSCRIPTION_ID }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'alpinehutscrawler-dev'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
